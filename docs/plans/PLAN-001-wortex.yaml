      **PRD:** [PRD-001](https://github.com/esukram/wordle/blob/main/docs/prd/PRD-001-wortex.md) · **Implements:** PRD-001-R4

      ## Context
      Make Language a first-class switch per
      [PRD-001 R4](https://github.com/esukram/wordle/blob/main/docs/prd/PRD-001-wortex.md#r4-language-switching)
      (vocabulary per
      [CONTEXT.md](https://github.com/esukram/wordle/blob/main/CONTEXT.md)).
      Already in the repo:
      - `data/words-en.js` / `data/words-de.js` — `GUESSES_EN` / `GUESSES_DE`;
        `data/solutions-en.js` / `data/solutions-de.js` — `SOLUTIONS_EN` /
        `SOLUTIONS_DE`;
      - `js/keyboard.js` — `LAYOUTS.en` (QWERTY) and `LAYOUTS.de` (QWERTZ);
      - `js/daily.js` — `dailySolution(language, now?)`;
      - `js/storage.js` — `createStorage(backend?)` with `getLang()` /
        `setLang(lang)` (key `wortex.v1.lang`), per-Language stats and daily
        state (keys `wortex.v1.stats.<lang>`, `wortex.v1.daily.<lang>`);
      - `js/statsview.js` — `renderStats(stats)`;
      - `js/app.js` — Daily Puzzle (with per-Language persistence/restore),
        Free Play, Statistics recording/view, currently hardwired to `'en'`;
        `#lang-toggle` exists in `index.html`.
      Conventions: ES modules; tests in `test/*.test.js` via `node --test`;
      library modules DOM-free; `js/app.js` import-safe in Node.

      Changes:
      1. **`js/language.js`** (new, DOM-free):
         `export function defaultLanguage(navLang)` → `'de'` when `navLang` is
         a string starting with `'de'` (case-insensitive, e.g. `de`, `de-AT`),
         else `'en'`; and a Language config map
         `{ en: { guesses, solutions, layout }, de: { ... } }` assembling the
         imports above so `app.js` switches through one object.
      2. **`js/app.js`** (edit): resolve the active Language on boot —
         `getLang()` from storage, else
         `defaultLanguage(navigator.language)` — and persist every change via
         `setLang`. `#lang-toggle` flips en ↔ de and re-wires everything from
         the config map: valid-guess dictionary, solution source (Daily Puzzle
         via `dailySolution(lang)` with that Language's persisted daily state
         restored, or a new Free Play round from that Language's solutions),
         on-screen keyboard layout (QWERTY ↔ QWERTZ), and the displayed
         Statistics. The two Languages' Daily Puzzles are independent — both
         playable on the same date, each with its own persisted state and
         Statistics.
      3. **`test/language.test.js`** (new): `defaultLanguage` returns `'de'`
         for `'de'`, `'de-AT'`, `'DE-de'`; `'en'` for `'en-US'`, `'fr'`,
         `undefined`; the config map wires `de` to `GUESSES_DE`/`SOLUTIONS_DE`/
         QWERTZ layout and `en` to `GUESSES_EN`/`SOLUTIONS_EN`/QWERTY layout.

      ## Acceptance criteria
      - Switching Language swaps dictionary, keyboard layout, and displayed
        Statistics; the choice survives reload via `wortex.v1.lang`.
      - First visit with a `de*` browser language starts in German, otherwise
        English.
      - English and German Daily Puzzles of the same date are independent and
        both playable.

      ## Verification
      - `node --test test/language.test.js` — default detection and config wiring pass
      - `node --test test/` — full suite stays green
      - `node -e "import('./js/app.js').then(()=>{},e=>{console.error(e);process.exit(1)})"` — app module still loads without a DOM
