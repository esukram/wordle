      **PRD:** [PRD-001](https://github.com/esukram/wordle/blob/main/docs/prd/PRD-001-wortex.md) · **Implements:** PRD-001-R5

      ## Context
      Surface Statistics per
      [PRD-001 R5](https://github.com/esukram/wordle/blob/main/docs/prd/PRD-001-wortex.md#r5-statistics-per-language)
      and record Daily Puzzle outcomes. Already in the repo:
      - `js/stats.js` — `emptyStats()`,
        `updateStats(stats, { won, attempts, dayIndex })` (pure; streak and
        distribution rules inside); stats shape
        `{played, wins, losses, currentStreak, maxStreak, dist:[6], lastDayIndex}`;
      - `js/storage.js` — `createStorage(backend?)` with `getStats(lang)` /
        `setStats(lang, stats)` over keys `wortex.v1.stats.<lang>`;
      - `js/app.js` — Daily Puzzle flow with a round-end point (status flips to
        `'won'`/`'lost'`);
      - `index.html` — `#stats-button`, `#stats-modal` (hidden), `#stats-content`,
        `#stats-close`; `css/style.css` has modal styles.
      Conventions: ES modules; tests in `test/*.test.js` via `node --test`;
      library modules DOM-free; `js/app.js` import-safe in Node. Only Daily
      Puzzle results update Statistics — Free Play never does.

      Changes:
      1. **`js/statsview.js`** (new, DOM-free): `renderStats(stats)` → an HTML
         string for `#stats-content`: games played, win percentage, current
         streak, max streak, and a guess-distribution bar per attempt count 1–6
         (bar width proportional to the bucket's share of the max bucket;
         counts shown as text so the output is assertable).
      2. **`js/app.js`** (edit): on Daily Puzzle round end, run
         `updateStats(getStats(lang), { won, attempts, dayIndex })`, persist
         with `setStats(lang, ...)`, then open `#stats-modal` populated via
         `renderStats`. `#stats-button` opens the modal with the active
         Language's current Statistics at any time; `#stats-close` closes it.
      3. **`css/style.css`** (edit): distribution-bar styling.
      4. **`test/stats-view.test.js`** (new): `renderStats` output contains
         the played/streak/max-streak numbers and one bar per bucket with the
         correct counts; zero-stats input renders without division-by-zero
         artifacts (0% win rate, empty bars).

      ## Acceptance criteria
      - Finishing a Daily Puzzle persists updated Statistics under
        `wortex.v1.stats.<lang>` and opens the statistics view showing the new
        values.
      - The view shows games played, wins, losses (or win %), current streak,
        max streak, and the 1–6 guess distribution for the active Language.
      - Free Play still records nothing (recording lives only in the Daily
        round-end path).

      ## Verification
