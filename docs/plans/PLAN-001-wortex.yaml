      - `node -e "const p=require('./package.json'); const n=(o)=>o&&Object.keys(o).length; if (p.type!=='module'||n(p.dependencies)||n(p.devDependencies)) process.exit(1)"` — asserts module type and zero dependencies
      - `test ! -f package-lock.json && test ! -f npm-shrinkwrap.json` — no lockfile committed
      - `grep -q 'FrequencyWords' WORD-LISTS-LICENSE && grep -qi 'CC BY-SA 4.0' WORD-LISTS-LICENSE` — attribution notice present
      - `grep -q 'http.server' README.md && grep -q 'node --test' README.md` — run instructions present

  - key: T2
    title: "English word lists: ENABLE guesses + curated shuffled solutions"
    implements: [PRD-001-R1, PRD-001-R4]
    adr_refs: [ADR-0001, ADR-0002]
    depends_on: [T1]
    parallel_ok: true
    issue: null
    body: |
      **PRD:** [PRD-001](https://github.com/esukram/wordle/blob/main/docs/prd/PRD-001-wortex.md) · **Implements:** PRD-001-R1, PRD-001-R4 · **ADR:** ADR-0001, ADR-0002

      ## Context
      Derive and commit the English word-list data files per
      [ADR-0001](https://github.com/esukram/wordle/blob/main/docs/adr/ADR-0001-word-list-sources.md)
      and [ADR-0002](https://github.com/esukram/wordle/blob/main/docs/adr/ADR-0002-daily-word-selection.md).
      The repo has `package.json` with `"type": "module"` — all `.js` files are
      ES modules; tests live in `test/*.test.js` and run with `node --test`.
      Derivation details: [RES-001](https://github.com/esukram/wordle/blob/main/docs/research/RES-001-word-list-sourcing.md).

      Create:
      1. **`data/words-en.js`** (new): `export const GUESSES_EN = [ ... ];` —
         the ENABLE word list (public domain; e.g.
         https://raw.githubusercontent.com/dolph/dictionary/master/enable1.txt
         or any ENABLE mirror), filtered to `^[a-z]{5}$`, deduplicated, sorted
         alphabetically (guess-list order is not load-bearing). Expected count
         ≈ 8,636; must be ≥ 5,000.
      2. **`data/solutions-en.js`** (new): `export const SOLUTIONS_EN = [ ... ];`
         — intersection of `GUESSES_EN` with the FrequencyWords English top-50k
         (first whitespace-separated column of
         https://raw.githubusercontent.com/hermitdave/FrequencyWords/master/content/2018/en/en_50k.txt,
         lowercased, same filter; expected ≈ 3,791 candidates), then **one
         bounded curation pass** removing proper-noun homographs and offensive
         words — a derivation-process instruction for this task, not a
         mechanically verified property — then **shuffled exactly once**
         (e.g. `shuf`) and committed in that play order. Must remain ≥ 1,000
         and a strict subset of `GUESSES_EN`. File header comment (required):
         `// Play order is load-bearing (ADR-0002): never sort, reorder, or insert — append only.`
      3. **`test/words-en.test.js`** (new), asserting: every word in both
         arrays matches `/^[a-z]{5}$/`; no duplicates; every solution is in the
         guess list; `GUESSES_EN.length >= 5000`; `SOLUTIONS_EN.length >= 1000`;
         a **head guard** — `SOLUTIONS_EN.slice(0, 10)` deep-equals the ten
         literal words you commit (copy them into the test after generating;
         this catches accidental re-sorts of the play order); and a
         **not-sorted assertion** —
         `assert.notDeepStrictEqual(SOLUTIONS_EN, [...SOLUTIONS_EN].sort())` —
         proving the committed play order is not alphabetical.

      Fetching upstream sources happens during this task only; the committed
      files and test run offline thereafter. Do not commit the raw upstream
      files.

      ## Acceptance criteria
      - `data/words-en.js` and `data/solutions-en.js` exist with the exports,
        counts, subset relation, and do-not-reorder header described above.
      - The committed solution order is not alphabetical, enforced by the
        test's `notDeepStrictEqual` not-sorted assertion.
      - `test/words-en.test.js` pins the first ten solutions and enforces
        format, size floors, uniqueness, the subset relation, and the
        not-sorted assertion.

      ## Verification
      - `node --test test/words-en.test.js` — all list invariants, the head guard, and the not-sorted assertion pass
      - `node --test test/product-surface.test.js` — the new data files keep the product surface clean

