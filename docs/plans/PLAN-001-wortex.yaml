    body: |
      **PRD:** [PRD-001](https://github.com/esukram/wordle/blob/main/docs/prd/PRD-001-wortex.md) · **Implements:** PRD-001-R7 · **ADR:** ADR-0001

      ## Context
      The repo currently contains only `docs/`, `CONTEXT.md`, `ARCHITECTURE.md`,
      and `CLAUDE.md` — no source tree. Wortex ships as static, dependency-free
      HTML/CSS/JS per
      [PRD-001 R7](https://github.com/esukram/wordle/blob/main/docs/prd/PRD-001-wortex.md#r7-static-dependency-free-delivery).
      Create the project scaffold every later task builds on:

      1. **`package.json`** (new, repo root): exactly
         `{"name": "wortex", "private": true, "type": "module"}` — no
         `dependencies`, no `devDependencies`, no lockfile. `"type": "module"`
         makes plain `.js` files ES modules for both the browser and
         `node --test`.
      2. **`README.md`** (new, repo root): what Wortex is (use the vocabulary of
         [CONTEXT.md](https://github.com/esukram/wordle/blob/main/CONTEXT.md):
         Daily Puzzle, Free Play, Language, Statistics), how to run it
         (`python3 -m http.server` from the repo root, open
         `http://localhost:8000/`), how to run tests (`node --test test/`).
         The README must not name any third-party game or publisher (R7).
      3. **`WORD-LISTS-LICENSE`** (new, repo root), per
         [ADR-0001](https://github.com/esukram/wordle/blob/main/docs/adr/ADR-0001-word-list-sources.md):
         a CC BY-SA 4.0 attribution notice stating that
         `data/solutions-en.js` and `data/solutions-de.js` are derived from the
         hermitdave/FrequencyWords frequency lists (built from the OpenSubtitles
         corpus), list content licensed CC BY-SA 4.0, with a link to the
         FrequencyWords repository and to the CC BY-SA 4.0 license; and that the
         valid-guess lists derive from ENABLE (public domain) and
         enz/german-wordlist (CC0), which require no attribution. Name corpora
         only — never any game or publisher.
      4. **`test/product-surface.test.js`** (new): a `node --test` test that
         recursively reads every file under the product surface — `index.html`,
         `README.md`, `package.json`, `WORD-LISTS-LICENSE`, and the `css/`,
         `js/`, `data/` directories (each only if it exists; skip `docs/`,
         `test/`, `.git/`, `.hive/`, `.claude/`) — lowercases the content, and
         asserts none contains a banned substring. Banned substrings: the name
         of the genre-original word-guessing game this genre is known by, plus
         the full name and the three-letter initialism of the New York
         newspaper company that publishes it. Build these strings inside the
         test via `String.fromCharCode(...)` so the test file itself never
         contains them literally and stays grep-clean. The same test also reads
         `package.json` and asserts `dependencies` and `devDependencies` are
         absent or empty.

      ## Acceptance criteria
      - `package.json` exists with `"type": "module"` and zero dependencies of
        any kind; no lockfile is committed.
      - `README.md` documents the static-server run command and the test
        command, using CONTEXT.md vocabulary, with no third-party
        game/publisher names.
      - `WORD-LISTS-LICENSE` carries the CC BY-SA 4.0 notice for the two
        solution-list files, naming FrequencyWords/OpenSubtitles as corpus
        sources and no game or publisher.
      - `test/product-surface.test.js` fails if a banned name is introduced
        anywhere on the product surface or a dependency is added.

      ## Verification
