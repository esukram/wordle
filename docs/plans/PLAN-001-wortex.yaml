      Already in the repo:
      - `js/game.js` — `createRound(solution, guessSet)`, `submitGuess`,
        `keyStates`;
      - `data/solutions-en.js` — `SOLUTIONS_EN`;
      - `js/app.js` — board/keyboard rendering, input handling, and the Daily
        Puzzle boot flow with per-date persistence/restore via `js/storage.js`
        (`getDaily`/`setDaily`/`clearDaily` over key `wortex.v1.daily.<lang>`);
      - `index.html` — `#mode-daily`, `#mode-free`, and a hidden `#new-round`
        button.
      Conventions: ES modules; tests in `test/*.test.js` via `node --test`;
      library modules DOM-free; `js/app.js` import-safe in Node.

      Changes:
      1. **`js/game.js`** (edit): add DOM-free
         `randomSolution(list, rng = Math.random)` →
         `list[Math.floor(rng() * list.length)]`.
      2. **`js/app.js`** (edit): `#mode-free` switches to Free Play — a fresh
         round with `randomSolution` over the active Language's solution list;
         show `#new-round`, which starts another random round at any time
         (immediately after a finished round included). `#mode-daily` switches
         back to the Daily Puzzle (restoring its persisted state). Free Play
         writes **nothing** to storage: no Statistics update, no daily-state
         write — the Statistics-recording code path must be reachable only
         from the Daily Puzzle flow.
      3. **`test/freeplay.test.js`** (new): `randomSolution` returns a list
         member for boundary rng values (0 and 0.999…) and honors an injected
         deterministic rng; starting a new round after a finished one yields an
         independent `'playing'` round with zero guesses.

      ## Acceptance criteria
      - Free Play rounds can be started back-to-back without reload.
      - Statistics and daily-state localStorage values are byte-identical
        before and after a completed Free Play round (structurally: the Free
        Play flow calls no storage writer).
      - Daily ↔ Free Play switching preserves the Daily Puzzle's persisted
        state.

      ## Verification
      - `node --test test/freeplay.test.js` — picker and new-round cases pass
      - `node --test test/` — full suite stays green
      - `node -e "import('./js/app.js').then(()=>{},e=>{console.error(e);process.exit(1)})"` — app module still loads without a DOM

