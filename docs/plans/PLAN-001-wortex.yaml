  - key: T8
    title: "Round controller, keyboard layouts, and board/keyboard UI"
    implements: [PRD-001-R1, PRD-001-R4]
    adr_refs: []
    depends_on: [T2, T4, T7]
    parallel_ok: true
    issue: null
    body: |
      **PRD:** [PRD-001](https://github.com/esukram/wordle/blob/main/docs/prd/PRD-001-wortex.md) · **Implements:** PRD-001-R1, PRD-001-R4

      ## Context
      Implement the playable round per
      [PRD-001 R1](https://github.com/esukram/wordle/blob/main/docs/prd/PRD-001-wortex.md#r1-core-guessing-gameplay):
      DOM-free game logic plus the UI layer. Already in the repo:
      - `js/scoring.js` — `score(guess, solution)` → array of five
        `'correct'|'present'|'absent'` marks (duplicate counting rule inside);
      - `data/words-en.js` — `export const GUESSES_EN` (lowercase 5-letter
        valid guesses);
      - `data/solutions-en.js` — `export const SOLUTIONS_EN`;
      - `index.html` with containers `#board`, `#keyboard`, `#message`, and
        `css/style.css` with tile/key state classes `.correct`, `.present`,
        `.absent` and a `.shake` rejection-cue class.
      Conventions: ES modules (`"type": "module"`); tests in `test/*.test.js`
      via `node --test`; **library modules never touch the DOM**; `js/app.js`
      must be import-safe in Node — it only calls its init function when
      `typeof document !== 'undefined'`.

      Create:
      1. **`js/game.js`** (new, DOM-free): round state machine.
         - `createRound(solution, guessSet)` → `{ solution, guesses: [], status: 'playing' }`
           (`guessSet` is a `Set` of valid guesses);
         - `submitGuess(round, word)` → pure; returns
           `{ round, rejected: true }` unchanged when `word` is not in the
           guess set (an invalid guess never consumes an attempt), otherwise a
           new round with `{ word, marks }` appended (marks via
           `score(word, solution)`), `status` flipping to `'won'` when
           `word === solution` and `'lost'` after the 6th wrong guess;
         - `keyStates(guesses)` → map letter → best-known state with precedence
           `correct > present > absent` (feeds the on-screen keyboard).
      2. **`js/keyboard.js`** (new, DOM-free data + render helpers):
         `export const LAYOUTS = { en: ['qwertyuiop','asdfghjkl','zxcvbnm'], de: ['qwertzuiop','asdfghjkl','yxcvbnm'] }`
         (QWERTY / QWERTZ per R4) plus Enter and Backspace keys on the bottom
         row.
      3. **`js/app.js`** (new): browser wiring — render the 5×6 grid into
         `#board`; render the on-screen keyboard for a given layout into
         `#keyboard` and re-color keys from `keyStates`; handle on-screen
         clicks and physical `keydown` (letters, Enter, Backspace); on submit
         of a non-valid guess show a rejection cue (`.shake` on the current row
         plus a `#message` text) without consuming an attempt; on win/loss show
         a visible end state in `#message` (revealing the solution on loss) and
         stop input. For now boot a single round against a fixed English
         solution using `GUESSES_EN` (the Daily Puzzle / Free Play / Language
         modes arrive in later tasks). Guard all DOM work behind
         `if (typeof document !== 'undefined')`.
      4. **`test/game.test.js`** (new): valid guess consumes an attempt and
         yields 5 marks; invalid guess rejected with round unchanged; win on
         exact match; loss after 6 wrong guesses; `keyStates` precedence
         (correct beats present beats absent across multiple guesses).
      5. **`test/keyboard.test.js`** (new): both layouts contain exactly 26
         distinct a–z letters; `en` top row starts `qwerty`, `de` top row
         starts `qwertz`.

      ## Acceptance criteria
      - A round is fully playable in the browser via physical and on-screen
        keyboard: colored tiles, keyboard state mirroring, rejection cue,
        win/lose end states.
      - `js/game.js` and `js/keyboard.js` are pure/DOM-free and Node-testable.
      - `js/app.js` imports cleanly in Node without a DOM.

      ## Verification
      - `node --test test/game.test.js test/keyboard.test.js` — round logic, key states, and layouts pass
      - `node -e "import('./js/app.js').then(()=>{},e=>{console.error(e);process.exit(1)})"` — app module and all its imports load without a DOM

  - key: T9
    title: "Daily Puzzle mode: wiring, in-progress persistence, no-replay"
    implements: [PRD-001-R2, PRD-001-R6]
    adr_refs: [ADR-0002]
    depends_on: [T5, T6, T8]
    parallel_ok: false
    issue: null
    body: |
      **PRD:** [PRD-001](https://github.com/esukram/wordle/blob/main/docs/prd/PRD-001-wortex.md) · **Implements:** PRD-001-R2, PRD-001-R6 · **ADR:** ADR-0002

      ## Context
      Wire the Daily Puzzle mode per
      [PRD-001 R2](https://github.com/esukram/wordle/blob/main/docs/prd/PRD-001-wortex.md#r2-daily-puzzle)
      and [R6](https://github.com/esukram/wordle/blob/main/docs/prd/PRD-001-wortex.md#r6-in-progress-persistence),
      constrained by
      [ADR-0002](https://github.com/esukram/wordle/blob/main/docs/adr/ADR-0002-daily-word-selection.md)'s
      day-index semantics. Already in the repo:
      - `js/daily.js` — `dayIndex(now?)` and `dailySolution(language, now?)`;
      - `js/game.js` — `createRound(solution, guessSet)`,
        `submitGuess(round, word)`, `keyStates(guesses)`; round shape
        `{ solution, guesses: [{word, marks}], status: 'playing'|'won'|'lost' }`;
      - `js/storage.js` — `createStorage(backend?)` with
        `getDaily(lang)` / `setDaily(lang, state)` / `clearDaily(lang)` over key
        `wortex.v1.daily.<lang>`, value
        `{"dayIndex":<int>,"guesses":["<word>",...],"status":"playing"|"won"|"lost"}`;
      - `js/app.js` — board/keyboard rendering and input handling, currently
        booting a fixed round; `#mode-daily`, `#mode-free`, `#message` exist in
        `index.html`.
      Conventions: ES modules; tests in `test/*.test.js` via `node --test`;
      library modules DOM-free; `js/app.js` import-safe in Node (DOM work
      guarded by `typeof document !== 'undefined'`).

      Changes:
      1. **`js/game.js`** (edit): add DOM-free
         `restoreRound(words, solution, guessSet)` — replays a stored guess
         list through `submitGuess` to rebuild the full round (marks, status),
         and `serializeRound(round, dayIndex)` → the stored daily shape above.
      2. **`js/app.js`** (edit): make Daily Puzzle the default mode. On boot
         (per active Language, default `'en'` for now): compute today's
         `dayIndex` and `dailySolution`; load stored daily state; if stored
         `dayIndex` matches today, restore the round (grid, keyboard states,
         remaining attempts) — including finished states, which render the end
         state and block further input (no replay until the next date); if
         stored `dayIndex` differs, discard it (`clearDaily`) and start fresh.
         Persist via `setDaily` after every accepted guess and on round end.
      3. **`test/daily-state.test.js`** (new): `restoreRound` rebuilds marks,
         status and attempt count from stored words (in-progress, won, and
         lost cases); `serializeRound` round-trips through `restoreRound`;
         stale-date logic — a stored state whose `dayIndex` differs from
         today's is not restored (test the pure decision helper you extract
         for this, e.g. `isFreshDaily(stored, todayIndex)` in `js/game.js`).

      ## Acceptance criteria
      - Reload mid-Daily-Puzzle restores grid, keyboard state, and remaining
        attempts exactly; reload after finishing shows the finished end state,
        not a fresh grid.
      - Stored state from a previous date is discarded when a new date's Daily
        Puzzle begins.
      - All persistence goes through `js/storage.js` (key
        `wortex.v1.daily.<lang>`); no direct `localStorage` calls in `app.js`.

      ## Verification
      - `node --test test/daily-state.test.js` — restore, serialize, and stale-date cases pass
      - `node --test test/` — full suite stays green
      - `node -e "import('./js/app.js').then(()=>{},e=>{console.error(e);process.exit(1)})"` — app module still loads without a DOM

