  - key: T4
    title: "Scoring function with duplicate-letter counting rule"
    implements: [PRD-001-R1]
    adr_refs: []
    depends_on: [T1]
    parallel_ok: true
    issue: null
    body: |
      **PRD:** [PRD-001](https://github.com/esukram/wordle/blob/main/docs/prd/PRD-001-wortex.md) · **Implements:** PRD-001-R1

      ## Context
      Implement the pure guess-scoring function required by
      [PRD-001 R1](https://github.com/esukram/wordle/blob/main/docs/prd/PRD-001-wortex.md#r1-core-guessing-gameplay).
      The repo is dependency-free static JS: ES modules (`package.json` has
      `"type": "module"`), tests in `test/*.test.js` via `node --test`, no DOM
      access in library modules.

      Create:
      1. **`js/scoring.js`** (new): `export function score(guess, solution)` —
         both arguments lowercase 5-letter strings; returns an array of five
         marks, each `'correct' | 'present' | 'absent'`. Two-pass algorithm:
         first mark exact-position matches `'correct'` and consume those
         solution letters; then, left to right, mark a guess letter `'present'`
         only while unconsumed occurrences of it remain in the solution
         (consuming one per mark); everything else is `'absent'`. This is the
         standard counting rule: a letter is marked present at most as many
         times as it occurs unmatched in the solution.
      2. **`test/scoring.test.js`** (new) covering at minimum:
         - all-correct (guess === solution) → five `'correct'`;
         - no letters shared → five `'absent'`;
         - PRD case: solution `apple`, guess `paper` →
           `['present','present','correct','present','absent']`;
         - PRD case: solution `robot`, guess `oozes` →
           `['present','correct','absent','absent','absent']`;
         - a correct-position match consumes before a present-mark of the same
           letter elsewhere (e.g. solution `abbey`, guess `bebop`:
           the second guess `b` is correct at index 2 and the first `b` is
           present, `o`/`p` absent, `e` present).

      ## Acceptance criteria
      - `score` is a pure function (no DOM, no globals, no state).
      - Both PRD duplicate-letter cases pass exactly as specified.
      - The module is importable by Node and the browser unchanged.

      ## Verification
      - `node --test test/scoring.test.js` — all scoring cases pass

  - key: T5
    title: "Daily Puzzle date→word mapping per ADR-0002"
    implements: [PRD-001-R2]
    adr_refs: [ADR-0002]
    depends_on: [T2, T3]
    parallel_ok: true
    issue: null
    body: |
      **PRD:** [PRD-001](https://github.com/esukram/wordle/blob/main/docs/prd/PRD-001-wortex.md) · **Implements:** PRD-001-R2 · **ADR:** ADR-0002

      ## Context
      Implement the deterministic date→word mapping decided in
      [ADR-0002](https://github.com/esukram/wordle/blob/main/docs/adr/ADR-0002-daily-word-selection.md)
      for [PRD-001 R2](https://github.com/esukram/wordle/blob/main/docs/prd/PRD-001-wortex.md#r2-daily-puzzle).
      Solution lists exist as ES modules: `data/solutions-en.js` exports
      `SOLUTIONS_EN`, `data/solutions-de.js` exports `SOLUTIONS_DE` — arrays of
      lowercase 5-letter words committed in load-bearing shuffled play order.
      Conventions: ES modules (`"type": "module"`), tests in `test/*.test.js`
      via `node --test`, no DOM in library modules.

      Create **`js/daily.js`** (new) exporting:
      - `EPOCH` — constructed as **local midnight**: `new Date(2026, 6, 1)`
        (2026-07-01). Never a fixed-milliseconds constant (ADR-0002 binds this).
      - `dayIndex(now = new Date())` — take local midnight of `now` via
        `new Date(now.getFullYear(), now.getMonth(), now.getDate())`, then
        `Math.round((localMidnight - EPOCH) / 864e5)`. `Math.round` absorbs
        23/25-hour DST days.
      - `dailySolution(language, now = new Date())` — `language` is `'en'` or
        `'de'`; picks `list[((i % N) + N) % N]` where `i = dayIndex(now)` and
        `list`/`N` are the Language's solution list and length. The
        normalization is required because JS `%` takes the dividend's sign;
        the modulo wrap is the accepted exhaustion backstop.

      And **`test/daily.test.js`** (new) pinning ADR-0002's confirmation cases:
      - determinism: same `(date, language)` twice → identical word;
      - consecutive dates: for every adjacent pair over a ≥ 400-day sampled
        range, `dayIndex` differs by exactly 1 (hence different list indexes);
      - DST straddle: date pairs around the last Sundays of March and October
        (e.g. 2027-03-27/28 and 2027-10-30/31) → `dayIndex` differs by
        exactly 1;
      - pre-epoch date (e.g. 2026-06-15) → `dailySolution` still returns a word
        from the list (normalized index in range);
      - per-Language independence: for one date, the English word is in
        `SOLUTIONS_EN` and the German word is in `SOLUTIONS_DE` (two separate
        lists, unrelated words).

      ## Acceptance criteria
      - The mapping is a pure function of (local date, Language); no network,
        no storage, no DOM.
      - Epoch is the local-midnight `Date` constructor form, never a fixed-ms
        value.
      - All five test groups above pass.

      ## Verification
      - `node --test test/daily.test.js` — determinism, adjacency, DST, pre-epoch, and independence cases pass

  - key: T6
    title: "Statistics update logic and localStorage schema"
    implements: [PRD-001-R5, PRD-001-R6]
    adr_refs: []
    depends_on: [T1]
    parallel_ok: true
    issue: null
    body: |
      **PRD:** [PRD-001](https://github.com/esukram/wordle/blob/main/docs/prd/PRD-001-wortex.md) · **Implements:** PRD-001-R5, PRD-001-R6

      ## Context
      Implement the pure Statistics logic
      ([PRD-001 R5](https://github.com/esukram/wordle/blob/main/docs/prd/PRD-001-wortex.md#r5-statistics-per-language))
      and the versioned localStorage schema
      ([R6](https://github.com/esukram/wordle/blob/main/docs/prd/PRD-001-wortex.md#r6-in-progress-persistence)).
      Vocabulary per [CONTEXT.md](https://github.com/esukram/wordle/blob/main/CONTEXT.md):
      Statistics are per-Language and only Daily Puzzle results update them.
      Conventions: ES modules (`"type": "module"`), tests in `test/*.test.js`
      via `node --test`, no DOM/localStorage access at module top level.

      **localStorage key schema (v1)** — this plan owns the layout (PRD Open
      Questions); all keys are strings, all values JSON:
      - `wortex.v1.lang` → `"en"` or `"de"`
      - `wortex.v1.stats.en` / `wortex.v1.stats.de` →
        `{"played":0,"wins":0,"losses":0,"currentStreak":0,"maxStreak":0,"dist":[0,0,0,0,0,0],"lastDayIndex":null}`
      - `wortex.v1.daily.en` / `wortex.v1.daily.de` →
        `{"dayIndex":<int>,"guesses":["<word>",...],"status":"playing"|"won"|"lost"}`

      Create:
      1. **`js/stats.js`** (new): `export function emptyStats()` returning the
         zeroed shape above, and
         `export function updateStats(stats, { won, attempts, dayIndex })` —
         pure, returns a **new** stats object: `played + 1`; on win `wins + 1`
         and `dist[attempts - 1] + 1`; on loss `losses + 1`; streak rule:
         win with `stats.lastDayIndex === dayIndex - 1` → `currentStreak + 1`,
         win otherwise (first game or missed date) → `1`, loss → `0`;
         `maxStreak = max(maxStreak, currentStreak)`; `lastDayIndex = dayIndex`.
      2. **`js/storage.js`** (new): thin wrapper owning the key schema.
         `export function createStorage(backend = globalThis.localStorage)`
         returning `{ getLang, setLang, getStats(lang), setStats(lang, stats),
         getDaily(lang), setDaily(lang, state), clearDaily(lang) }` — JSON
         (de)serialization, `emptyStats()` fallback for missing/corrupt stats,
         `null` for missing daily state. The injectable `backend` (anything
         with `getItem`/`setItem`/`removeItem`) makes it testable in Node.
      3. **`test/stats.test.js`** (new): win, loss, streak increment on
         consecutive `dayIndex`, streak reset to 1 on win after a gap, streak
         reset to 0 on loss, distribution bucketing, `maxStreak` retention,
         purity (input object unmodified).
      4. **`test/storage.test.js`** (new): with a plain-object `Map`-backed
         stub backend — English and German stats live under separate keys and
         update independently; round-trip of daily state; corrupt JSON falls
         back safely.

      ## Acceptance criteria
      - `updateStats` covers every case in R5's acceptance criteria as a pure
        function.
      - English and German Statistics use the separate keys above and never
        interfere.
      - No module touches `localStorage` at import time (Node-importable).

      ## Verification
      - `node --test test/stats.test.js test/storage.test.js` — all stats and storage cases pass

