      **Wortex** ([CONTEXT.md](https://github.com/esukram/wordle/blob/main/CONTEXT.md));
      no third-party game or publisher may be named anywhere (R7).

      Create:
      1. **`index.html`** (new, repo root): `<!doctype html>`, `lang="en"`,
         viewport meta, title `Wortex`, `<link rel="stylesheet" href="css/style.css">`,
         `<script type="module" src="js/app.js"></script>` (the script file
         arrives in a later task; a 404 until then is expected). Required
         elements with these exact ids:
         - header with the title, `#lang-toggle` (Language switch button),
           `#stats-button` (opens Statistics);
         - mode controls: `#mode-daily` and `#mode-free` (Daily Puzzle /
           Free Play toggle buttons), `#new-round` (Free Play new-round button,
           initially hidden);
         - `#message` (transient message/rejection-cue area, `aria-live="polite"`);
         - `#board` (empty container; JS renders the 5×6 tile grid);
         - `#keyboard` (empty container; JS renders the on-screen keyboard);
