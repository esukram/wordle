      ## Context
      Add Free Play per
      [PRD-001 R3](https://github.com/esukram/wordle/blob/main/docs/prd/PRD-001-wortex.md#r3-free-play):
      unlimited rounds against random solutions, never touching Statistics
      (vocabulary per
